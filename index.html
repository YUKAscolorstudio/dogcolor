<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');

  :root {
    --cream: #F7F4EF;
    --soft-blue: #B8D4E8;
    --dusty-blue: #7AAAC8;
    --terracotta: #C87850;
    --sage: #A0B89A;
    --sand: #D4C0A0;
    --text: #38301E;
    --text-light: #7A6848;
    --card-bg: #FDFAF5;
    --shadow: rgba(120, 90, 50, 0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  .header {
    background: linear-gradient(135deg, #EAF2F8 0%, #F5EDE3 50%, #EAF0E8 100%);
    padding: 36px 20px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    background: rgba(184,212,232,0.35);
    border-radius: 50%;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -20px; left: -20px;
    width: 90px; height: 90px;
    background: rgba(200,120,80,0.12);
    border-radius: 50%;
  }
  .header-icon { display: flex; justify-content: center; margin-bottom: 10px; }
  .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.04em; line-height: 1.4; }
  .header p  { margin-top: 8px; font-size: 13px; color: var(--text-light); }

  .progress-wrap { max-width: 480px; margin: 20px auto 0; padding: 0 20px; }
  .progress-label { font-size: 12px; color: var(--text-light); margin-bottom: 6px; text-align: right; }
  .progress-bar { height: 6px; background: rgba(120,90,50,0.12); border-radius: 99px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--dusty-blue), var(--terracotta));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .card-wrap { max-width: 480px; margin: 20px auto 0; padding: 0 16px; }

  .question-card {
    background: var(--card-bg);
    border-radius: 20px;
    padding: 28px 24px;
    box-shadow: 0 4px 20px var(--shadow);
  }

  .step-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--dusty-blue), var(--terracotta));
    color: white;
    font-size: 11px; font-weight: 700;
    padding: 4px 12px;
    border-radius: 99px;
    margin-bottom: 14px;
    letter-spacing: 0.06em;
  }

  .question-title { font-size: 18px; font-weight: 700; line-height: 1.5; margin-bottom: 6px; }
  .question-sub   { font-size: 12px; color: var(--text-light); margin-bottom: 20px; }

  .options-grid { display: grid; gap: 10px; }
  .options-grid.col2 { grid-template-columns: 1fr 1fr; }
  .options-grid.col1 { grid-template-columns: 1fr; }

  .option-btn {
    background: white;
    border: 2px solid rgba(120,90,50,0.12);
    border-radius: 14px;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--text); line-height: 1.4;
  }
  .option-btn:hover {
    border-color: var(--dusty-blue);
    background: #F0F6FC;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(122,170,200,0.2);
  }
  .option-btn.selected {
    border-color: var(--dusty-blue);
    background: linear-gradient(135deg, #EEF5FB, #FDF2EA);
  }
  .option-emoji { display: block; font-size: 24px; margin-bottom: 4px; }
  .option-label { display: block; font-size: 13px; }
  .option-sub   { display: block; font-size: 11px; color: var(--text-light); margin-top: 2px; }

  /* 品種グループイラスト */
  .breed-btn { padding: 12px 8px 10px; }
  .breed-illust { display: flex; align-items: center; justify-content: center; margin-bottom: 6px; }
  .breed-illust svg { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08)); transition: transform 0.2s ease; }
  .breed-btn:hover .breed-illust svg { transform: scale(1.08) translateY(-2px); }
  .breed-btn.selected .breed-illust svg { transform: scale(1.1); }
  .breed-btn .face-normal { opacity: 1; }
  .breed-btn .face-smile  { opacity: 0; }
  .breed-btn:hover .face-normal,
  .breed-btn.selected .face-normal { opacity: 0; }
  .breed-btn:hover .face-smile,
  .breed-btn.selected .face-smile  { opacity: 1; }

  .personality-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .personality-chip {
    background: white;
    border: 2px solid rgba(120,90,50,0.12);
    border-radius: 99px;
    padding: 10px 14px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 13px; color: var(--text);
    display: flex; align-items: center; gap: 6px;
    transition: all 0.15s ease;
  }
  .personality-chip:hover { border-color: var(--sage); background: #F3F8F3; }
  .personality-chip.selected {
    border-color: var(--sage);
    background: linear-gradient(135deg, #EEF6EE, #EEF4FA);
    font-weight: 700;
  }
  .personality-chip .chip-emoji { font-size: 16px; }

  .next-btn {
    display: block; width: 100%;
    margin-top: 24px; padding: 16px;
    background: linear-gradient(135deg, var(--dusty-blue), var(--terracotta));
    color: white; border: none; border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: 0.04em;
    transition: all 0.2s ease;
    box-shadow: 0 4px 14px rgba(122,170,200,0.35);
  }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(122,170,200,0.45); }
  .next-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .result-card {
    background: var(--card-bg); border-radius: 20px;
    padding: 32px 24px; box-shadow: 0 4px 20px var(--shadow);
    text-align: center;
  }
  .result-color-circle {
    width: 100px; height: 100px; border-radius: 50%;
    margin: 0 auto 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .result-color-name    { font-size: 26px; font-weight: 700; letter-spacing: 0.06em; margin-bottom: 4px; }
  .result-color-name-en { font-size: 13px; color: var(--text-light); margin-bottom: 18px; letter-spacing: 0.08em; }
  .result-section { background: white; border-radius: 14px; padding: 16px 18px; margin-bottom: 12px; text-align: left; }
  .result-section-title { font-size: 11px; font-weight: 700; color: var(--text-light); letter-spacing: 0.1em; margin-bottom: 8px; }
  .result-section p { font-size: 14px; line-height: 1.7; }
  .compat-colors { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 6px; }
  .compat-chip { display: flex; align-items: center; gap: 6px; background: var(--cream); border-radius: 99px; padding: 6px 12px; font-size: 13px; }
  .compat-dot  { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }

  .retry-btn {
    display: block; width: 100%; margin-top: 20px; padding: 14px;
    background: transparent; color: var(--text-light);
    border: 2px solid rgba(120,90,50,0.15); border-radius: 14px;
    font-family: 'Zen Maru Gothic', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.2s ease;
  }
  .retry-btn:hover { border-color: var(--dusty-blue); color: var(--text); }
  .share-hint { font-size: 11px; color: var(--text-light); margin-top: 16px; text-align: center; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }
  @keyframes pop { 0%{transform:scale(0.8);opacity:0;} 60%{transform:scale(1.06);} 100%{transform:scale(1);opacity:1;} }
  .pop { animation: pop 0.45s ease both; }
</style>

// ===== アプリ状態 =====
// step: 0=サイズ, 1=見た目, 2=毛色, 3=性別, 4=性格, 5=結果
let state = { step:0, size:null, look:null, coat:null, gender:null, personalities:[] };
const STEPS = ['size','look','coat','gender','personality','result'];

function getResult() {
  const table = COLOR_RESULTS[state.coat];
  if (!table) return COLOR_RESULTS['golden'].base;
  for (const p of state.personalities) { if (table[p]) return table[p]; }
  return table.base;
}

function updateProgress() {
  const wrap  = document.getElementById('progressWrap');
  const fill  = document.getElementById('progressFill');
  const label = document.getElementById('progressLabel');
  wrap.style.display = 'block';
  const pct = state.step >= STEPS.length-1 ? 100 : Math.round((state.step/(STEPS.length-1))*100);
  fill.style.width = pct+'%';
  label.textContent = state.step >= STEPS.length-1 ? '診断完了！' : `STEP ${state.step+1} / ${STEPS.length-1}`;
}

function render() {
  const root = document.getElementById('appRoot');
  updateProgress();
  if      (state.step===0) renderSize(root);
  else if (state.step===1) renderLook(root);
  else if (state.step===2) renderCoat(root);
  else if (state.step===3) renderGender(root);
  else if (state.step===4) renderPersonality(root);
  else                     renderResult(root);
}

// STEP 1: サイズ選択
function renderSize(root) {
  root.innerHTML = `
    <div class="question-card fade-up">
      <span class="step-badge">STEP 1 · 体の大きさ</span>
      <div class="question-title">うちの子、何サイズ？🐶</div>
      <div class="question-sub">体格に一番近いものをえらんでください</div>
      <div class="options-grid col1" id="sizeGrid"></div>
      <button class="next-btn" id="nextBtn" disabled onclick="nextStep()">つぎへ →</button>
    </div>`;
  const grid = document.getElementById('sizeGrid');
  SIZE_GROUPS.forEach(s => {
    const svgFn = BREED_SVG[s.id] || BREED_SVG['small'];
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.style.cssText = 'display:flex;align-items:center;gap:14px;text-align:left;padding:12px 16px;';
    btn.innerHTML = `
      <span style="flex-shrink:0">${svgFn()}</span>
      <span>
        <span class="option-label" style="font-size:15px;font-weight:700">${s.label}</span>
        <span class="option-sub" style="display:block;margin-top:2px">${s.sub}</span>
      </span>`;
    btn.onclick = () => {
      document.querySelectorAll('#sizeGrid .option-btn').forEach(x=>x.classList.remove('selected'));
      btn.classList.add('selected');
      state.size = s.id;
      document.getElementById('nextBtn').disabled = false;
    };
    grid.appendChild(btn);
  });
}

function renderPersonality(root) {
  root.innerHTML = `

      <div class="question-title">どんな子？🐾</div>

      <div class="personality-grid" id="personalityGrid"></div>
      <button class="next-btn" id="nextBtn" disabled onclick="nextStep()">診断する 🔮</button>
    </div>`;
  const grid = document.getElementById('personalityGrid');
  PERSONALITIES.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'personality-chip';
    btn.innerHTML = `<span class="chip-emoji">${p.emoji}</span>${p.label}`;
    btn.onclick = () => {
      const idx = state.personalities.indexOf(p.id);
      if (idx===-1) { state.personalities.push(p.id); btn.classList.add('selected'); }
      else { state.personalities.splice(idx,1); btn.classList.remove('selected'); }
      document.getElementById('nextBtn').disabled = state.personalities.length===0;
    };
    grid.appendChild(btn);
  });
}

function renderResult(root) {
  const result = getResult();
  const compat = COMPAT_MAP[state.coat] || COMPAT_MAP['golden'];
  const msg    = COLOR_MESSAGES[state.coat] || COLOR_MESSAGES['golden'];
  const breedLabel  = (SIZE_GROUPS.find(s=>s.id===state.size)?.label || '') + ' · ' + (LOOK_GROUPS.find(l=>l.id===state.look)?.label || '');
  const coatLabel   = COAT_COLORS.find(c=>c.id===state.coat)?.label || '';
  const genderLabel = state.gender==='female' ? '女の子' : '男の子';

  root.innerHTML = `
    <div class="result-card pop">
      <div style="font-size:12px;color:var(--text-light);margin-bottom:16px">${breedLabel} · ${coatLabel} · ${genderLabel}</div>
      <div class="result-color-circle" style="background:${result.hex}">${result.emoji}</div>

      <div class="result-color-name-en">${result.nameEn}</div>

      <div class="result-section">
        <div class="result-section-title">✦ カラーイメージ</div>

      <div class="result-section">

      <div class="result-section">
        <div class="result-section-title">✦ インテリアヒント</div>
        <p>首輪・リードや犬用マットに<strong>${compat[0].name}</strong>を取り入れると、うちの子の魅力がぐっと引き立ちます✨ <strong>${compat[1].name}</strong>をバランスカラーにするとおしゃれな空間に。</p>

      <button class="retry-btn" onclick="resetApp()">🔄 もう一度診断する</button>
      <p class="share-hint">結果をスクショしてSNSでシェアしてね🐾</p>
    </div>`;
}

function nextStep() {
  state.step++;
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
}
function resetApp() {
  state = { step:0, size:null, look:null, coat:null, gender:null, personalities:[] };
  render();
  window.scrollTo({ top:0, behavior:'smooth' });
}

render();
</script>
</body>
</html>
